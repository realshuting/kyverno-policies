apiVersion: v1
kind: ConfigMap
metadata:
  name: coco-sealed-secret-config
  annotations:
    description: |
      Configuration for CoCo sealed secrets injection.

      CoCo sealed secrets workflow:
      1. Create a secret envelope JSON:
         {"version":"0.1.0","type":"vault","name":"kbs:///default/mysecret/secret",
          "provider":"kbs","provider_settings":{},"annotations":{}}
      2. Encode as: sealed.<header>.<base64url(json)>.<signature>
      3. Store as a regular K8s Secret
      4. This policy injects the Secret into pods as env vars and/or volume mounts
      5. Kata agent unwraps the sealed secret inside TEE via KBS

      See https://confidentialcontainers.org/docs/features/sealed-secrets/
data:
  env_name: PROTECTED_SECRET
  secret_name: sealed-secret
  secret_key: secret
  volume_name: sealed-secret-volume
  mount_path: /sealed/myvalue
