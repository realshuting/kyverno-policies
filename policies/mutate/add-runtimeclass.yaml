apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-kata-cc-runtimeclass
  annotations:
    policies.kyverno.io/title: Add Kata CC RuntimeClass
    policies.kyverno.io/category: Confidential Containers
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      This policy mutates pods that have the label 'coco: enabled' to add
      the runtimeClassName 'kata-cc' for running workloads in confidential
      containers using Kata Containers.
spec:
  rules:
    - name: add-runtimeclass
      match:
        any:
          - resources:
              kinds:
                - Pod
              selector:
                matchLabels:
                  coco: enabled
      mutate:
        patchStrategicMerge:
          spec:
            runtimeClassName: kata-cc
