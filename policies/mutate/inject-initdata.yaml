apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-coco-initdata
  annotations:
    policies.kyverno.io/title: Inject CoCo InitData Annotation
    policies.kyverno.io/category: Confidential Containers
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      This policy injects the CoCo initdata annotation into pods that have
      the label 'coco: enabled' and reference an initdata ConfigMap via
      the annotation 'coco.io/initdata-configmap'. The ConfigMap should
      contain a 'data' key with base64-gzip encoded initdata content.
      See https://confidentialcontainers.org/docs/features/initdata/
spec:
  rules:
    - name: inject-initdata
      match:
        any:
          - resources:
              kinds:
                - Pod
              selector:
                matchLabels:
                  coco: enabled
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"coco.io/initdata-configmap\" || '' }}"
            operator: NotEquals
            value: ""
      context:
        - name: initdataConfigMap
          apiCall:
            urlPath: "/api/v1/namespaces/{{request.namespace}}/configmaps/{{request.object.metadata.annotations.\"coco.io/initdata-configmap\"}}"
            jmesPath: "data.data"
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              io.katacontainers.config.runtime.cc_init_data: "{{ initdataConfigMap }}"
