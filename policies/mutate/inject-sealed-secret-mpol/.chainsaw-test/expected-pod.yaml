apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: default
  labels:
    coco: enabled
  annotations:
    coco.io/sealed-secret-config: sealed-secret-config
spec:
  containers:
  - name: app
    image: nginx:1.20
    env:
    - name: EXISTING_VAR
      value: "existing-value"
    - name: PROTECTED_SECRET
      valueFrom:
        secretKeyRef:
          name: sealed-secret
          key: secret
    volumeMounts:
    - name: sealed-secret-volume
      mountPath: /sealed/myvalue
  - name: sidecar
    image: busybox:1.35
    env:
    - name: PROTECTED_SECRET
      valueFrom:
        secretKeyRef:
          name: sealed-secret
          key: secret
    volumeMounts:
    - name: sealed-secret-volume
      mountPath: /sealed/myvalue
  initContainers:
  - name: init
    image: busybox:1.35
    command: ["sh", "-c", "echo init"]
    env:
    - name: PROTECTED_SECRET
      valueFrom:
        secretKeyRef:
          name: sealed-secret
          key: secret
    volumeMounts:
    - name: sealed-secret-volume
      mountPath: /sealed/myvalue
  volumes:
  - name: sealed-secret-volume
    secret:
      secretName: sealed-secret
