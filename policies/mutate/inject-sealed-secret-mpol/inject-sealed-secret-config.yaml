apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  annotations:
    policies.kyverno.io/category: Confidential Containers
    policies.kyverno.io/description: >-
      Injects sealed secret references into pods with the 'coco=enabled' label
      and 'coco.io/sealed-secret-config' annotation. Adds a secretKeyRef env var
      and a secret volume mount to all containers. The sealed secret value
      (in "sealed.header.payload.signature" format) is stored in a regular K8s
      Secret and unwrapped by the kata agent inside the TEE via KBS at runtime.
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/title: Inject Sealed Secret Configuration
  name: inject-sealed-secret-config
spec:
  matchConditions:
  - expression: has(object.metadata.labels) && 'coco' in object.metadata.labels && object.metadata.labels['coco'] == 'enabled'
    name: has-coco-label
  - expression: has(object.metadata.annotations) && 'coco.io/sealed-secret-config' in object.metadata.annotations && object.metadata.annotations['coco.io/sealed-secret-config'] != ''
    name: has-sealed-secret-annotation
  matchConstraints:
    resourceRules:
    - apiGroups:
      - ""
      apiVersions:
      - v1
      operations:
      - CREATE
      - UPDATE
      resources:
      - pods
  mutations:
  - applyConfiguration:
      expression: |
        Object{
          spec: Object.spec{
            containers: object.spec.containers.map(container,
              Object.spec.containers{
                name: container.name,
                env: (has(container.env) ? container.env : []) + [
                  Object.spec.containers.env{
                    name: variables.configMapData['env_name'],
                    valueFrom: Object.spec.containers.env.valueFrom{
                      secretKeyRef: Object.spec.containers.env.valueFrom.secretKeyRef{
                        name: variables.configMapData['secret_name'],
                        key: variables.configMapData['secret_key']
                      }
                    }
                  }
                ],
                volumeMounts: (has(container.volumeMounts) ? container.volumeMounts : []) + [
                  Object.spec.containers.volumeMounts{
                    name: variables.configMapData['volume_name'],
                    mountPath: variables.configMapData['mount_path']
                  }
                ]
              }
            ),
            initContainers: has(object.spec.initContainers) ?
              object.spec.initContainers.map(container,
                Object.spec.initContainers{
                  name: container.name,
                  env: (has(container.env) ? container.env : []) + [
                    Object.spec.initContainers.env{
                      name: variables.configMapData['env_name'],
                      valueFrom: Object.spec.initContainers.env.valueFrom{
                        secretKeyRef: Object.spec.initContainers.env.valueFrom.secretKeyRef{
                          name: variables.configMapData['secret_name'],
                          key: variables.configMapData['secret_key']
                        }
                      }
                    }
                  ],
                  volumeMounts: (has(container.volumeMounts) ? container.volumeMounts : []) + [
                    Object.spec.initContainers.volumeMounts{
                      name: variables.configMapData['volume_name'],
                      mountPath: variables.configMapData['mount_path']
                    }
                  ]
                }
              ) : [],
            volumes: (has(object.spec.volumes) ? object.spec.volumes : []) + [
              Object.spec.volumes{
                name: variables.configMapData['volume_name'],
                secret: Object.spec.volumes.secret{
                  secretName: variables.configMapData['secret_name']
                }
              }
            ]
          }
        }
    patchType: ApplyConfiguration
  variables:
  - expression: object.metadata.annotations['coco.io/sealed-secret-config']
    name: configMapName
  - expression: resource.Get('v1', 'configmaps', object.metadata.namespace, variables.configMapName).data
    name: configMapData
