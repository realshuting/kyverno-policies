apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-coco-sealed-secret
  annotations:
    policies.kyverno.io/title: Inject CoCo Sealed Secret Configuration
    policies.kyverno.io/category: Confidential Containers
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      This policy injects sealed secret configuration into pods that have
      the label 'coco: enabled' and annotation 'coco.io/sealed-secret-config'.
      The configuration enables containers to retrieve secrets from KBS.
      See https://confidentialcontainers.org/docs/features/sealed-secrets/
spec:
  rules:
    - name: inject-sealed-secret-env
      match:
        any:
          - resources:
              kinds:
                - Pod
              selector:
                matchLabels:
                  coco: enabled
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"coco.io/sealed-secret-config\" || '' }}"
            operator: NotEquals
            value: ""
      context:
        - name: secretConfig
          apiCall:
            urlPath: "/api/v1/namespaces/{{request.namespace}}/configmaps/{{request.object.metadata.annotations.\"coco.io/sealed-secret-config\"}}"
            jmesPath: "data"
      mutate:
        foreach:
          - list: "request.object.spec.containers"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    env:
                      - name: COCO_SECRET_RESOURCE
                        value: "{{ secretConfig.secret_resource }}"
                      - name: COCO_SECRET_TARGET_PATH
                        value: "{{ secretConfig.target_path }}"
