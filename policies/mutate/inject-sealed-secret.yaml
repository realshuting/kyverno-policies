apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-coco-sealed-secret
  annotations:
    policies.kyverno.io/title: Inject CoCo Sealed Secret into Pod
    policies.kyverno.io/category: Confidential Containers
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      This policy injects sealed secret references into pods that have
      the label 'coco: enabled' and annotation 'coco.io/sealed-secret-config'.
      It adds a secretKeyRef env var and a secret volume mount to all containers.
      The sealed secret value (in "sealed.header.payload.signature" format) is
      stored in a regular K8s Secret and unwrapped by the kata agent inside the
      TEE via KBS at runtime.
      See https://confidentialcontainers.org/docs/features/sealed-secrets/
spec:
  rules:
    - name: inject-sealed-secret-env
      match:
        any:
          - resources:
              kinds:
                - Pod
              selector:
                matchLabels:
                  coco: enabled
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations.\"coco.io/sealed-secret-config\" || '' }}"
            operator: NotEquals
            value: ""
      context:
        - name: sealedConfig
          apiCall:
            urlPath: "/api/v1/namespaces/{{request.namespace}}/configmaps/{{request.object.metadata.annotations.\"coco.io/sealed-secret-config\"}}"
            jmesPath: "data"
      mutate:
        patchStrategicMerge:
          spec:
            containers:
              - name: "{{ request.object.spec.containers[0].name }}"
                env:
                  - name: "{{ sealedConfig.env_name }}"
                    valueFrom:
                      secretKeyRef:
                        name: "{{ sealedConfig.secret_name }}"
                        key: "{{ sealedConfig.secret_key }}"
                volumeMounts:
                  - name: "{{ sealedConfig.volume_name }}"
                    mountPath: "{{ sealedConfig.mount_path }}"
            volumes:
              - name: "{{ sealedConfig.volume_name }}"
                secret:
                  secretName: "{{ sealedConfig.secret_name }}"
