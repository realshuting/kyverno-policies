apiVersion: v1
kind: ConfigMap
metadata:
  name: test-initdata-valid
  labels:
    coco.io/type: initdata
data:
  version: "0.1.0"
  algorithm: "sha384"
  policy.rego: |
    package agent_policy
    default allow = true
  aa.toml: |
    [token_configs.kbs]
    url = "https://kbs.example.com:8080"
  cdh.toml: |
    [kbc]
    name = "cc_kbc"
    url = "https://kbs.example.com:8080"
